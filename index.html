<!DOCTYPE html>
<html>
<head>
  <title>Offers</title>
</head>
<body>

<div id="offers">Loading offers...</div>

<script>
async function loadOffers() {
  const container = document.getElementById("offers");

  try {
    const res = await fetch('/api/offers');

    if (!res.ok) throw new Error("Network error");

    const data = await res.json();

    if (!data || !Array.isArray(data.offers) || data.offers.length === 0) {
      container.innerText = "No offers available";
      return;
    }

    let html = "";

    for (const o of data.offers) {
      // basic safety fallback (prevents breaking UI)
      const img = o.picture || "";
      const name = o.name_short || "Offer";
      const link = o.link || "#";

      html += `
        <div>
          <img src="${img}" width="80"><br>
          <p>${name}</p>
          <a href="${link}">Complete Offer</a>
        </div>
        <hr>
      `;
    }

    container.innerHTML = html;

  } catch (e) {
    container.innerText = "Error loading offers";
  }
}

loadOffers();
</script>

</body>
</html>
