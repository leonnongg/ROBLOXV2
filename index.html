<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offers</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  max-width: 400px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
.offer {
  margin: 10px 0;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  text-align: center;
}
button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
button:hover {opacity:0.85;}
</style>
</head>
<body>

<div class="container">
  <h2>Available Offers</h2>
  <div id="offers">Loading offers...</div>
</div>

<script>
async function loadOffers() {
  try {
    const res = await fetch('/api/offers');
    const data = await res.json();

    const offersDiv = document.getElementById("offers");
    if (!data.offers || data.offers.length === 0) {
      offersDiv.innerText = "No offers available";
      return;
    }

    offersDiv.innerHTML = data.offers.map(o => `
      <div class="offer">
        <img src="${o.picture}" width="60"><br>
        <b>${o.name_short}</b><br>
        <a href="${o.link}" target="_blank">
          <button>View Offer</button>
        </a>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById("offers").innerText = "Error loading offers";
  }
}

loadOffers();
</script>

</body>
</html>
