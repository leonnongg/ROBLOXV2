<!DOCTYPE html>
<html>
<head>
  <title>Robux Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #181a1b;
      color: #e4e6eb;
    }

    /* NAVBAR */
    .navbar {
      height: 60px;
      background: #202225;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      border-bottom: 1px solid #2d2f33;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
    }

    /* Layout */
    .container {
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #202225;
      height: calc(100vh - 60px);
      padding: 20px;
      border-right: 1px solid #2d2f33;
    }

    .menu-item {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      color: #b0b3b8;
    }

    .menu-item:hover {
      background: #2d2f33;
      color: white;
    }

    .main {
      flex: 1;
      padding: 25px;
    }

    .panel {
      background: #202225;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #2d2f33;
      max-width: 600px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2d2f33;
      color: white;
      margin-top: 10px;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #5865f2;
      color: white;
      margin-top: 10px;
      cursor: pointer;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-wrap: wrap;
    }

    .card {
      background: #2d2f33;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      width: 140px;
      text-align: center;
      cursor: pointer;
    }

    .card:hover { background:#3a3d42; }

    /* Offers */
    .offers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
      gap: 15px;
    }

    .offer {
      background: #202225;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #2d2f33;
      text-align: center;
    }

    /* Skeleton */
    .skeleton {
      height: 150px;
      background: linear-gradient(90deg,#2d2f33,#3a3d42,#2d2f33);
      animation: shimmer 1.2s infinite;
      border-radius: 10px;
    }

    @keyframes shimmer {
      0% {background-position:-200px 0;}
      100% {background-position:200px 0;}
    }

    /* User */
    .user-box {
      display: flex;
      gap: 15px;
      align-items: center;
      background: #2d2f33;
      padding: 15px;
      border-radius: 10px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 10px;
    }

    /* Progress */
    .progress {
      height: 10px;
      background: #2d2f33;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00c853;
    }

    .hidden { display:none; }

    @media(max-width:768px){
      .sidebar{display:none;}
      .container{flex-direction:column;}
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">Roblox Panel</div>
  <div id="navUser"></div>
</div>

<div class="container">

<div class="sidebar">
  <div class="menu-item" onclick="nav('main')">Robux</div>
  <div class="menu-item" onclick="nav('user')">User</div>
  <div class="menu-item" onclick="nav('support')">Support</div>
</div>

<div class="main">

<!-- MAIN -->
<div id="main" class="panel">
  <h2>Robux Generator</h2>
  <input id="username" placeholder="Username">
  <button onclick="start()">Continue</button>
</div>

<!-- LOADING -->
<div id="loading" class="panel hidden">
  <h3>Verifying...</h3>
</div>

<!-- SELECT -->
<div id="select" class="panel hidden">
  <h3>Select Amount</h3>
  <div class="cards">
    <div class="card" onclick="choose()">100</div>
    <div class="card" onclick="choose()">200</div>
    <div class="card" onclick="choose()">300</div>
    <div class="card" onclick="choose()">400</div>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="hidden">
  <h3>Complete Tasks</h3>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="offers" class="offers-grid"></div>
</div>

<!-- USER -->
<div id="user" class="hidden">
  <h3>User Profile</h3>
  <div class="user-box">
    <img id="avatar" class="avatar">
    <div>
      <p id="uname"></p>
      <p id="uid"></p>
    </div>
  </div>
</div>

<!-- SUPPORT -->
<div id="support" class="hidden">
  <h3>Support</h3>
  <p>24/7 support available</p>
</div>

</div>
</div>

<script>
let username="";

// Nav
function nav(id){
  document.querySelectorAll('.main > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// Start
function start(){
  username=document.getElementById("username").value;
  if(!username) return alert("Enter username");

  nav("loading");

  setTimeout(()=>{
    nav("select");
    genUser();
  },1500);
}

// User
async function genUser(){
  document.getElementById("uname").innerText=username;
  document.getElementById("uid").innerText="ID: "+Math.floor(Math.random()*999999999);
  document.getElementById("navUser").innerText=username;

  // Avatar fetch (Roblox API)
  document.getElementById("avatar").src =
  `https://thumbnails.roblox.com/v1/users/avatar-headshot?username=${username}&size=150x150&format=Png`;
}

// Choose
function choose(){
  nav("tasks");
  loadSkeleton();
  loadOffers();
}

// Skeleton loading
function loadSkeleton(){
  let sk="";
  for(let i=0;i<6;i++){
    sk+=`<div class="skeleton"></div>`;
  }
  document.getElementById("offers").innerHTML=sk;
}

// API
async function loadOffers(){
  try{
    const res=await fetch('/api/offers');
    const data=await res.json();

    let html="";
    data.offers.forEach((o,i)=>{
      html+=`
      <div class="offer">
        <img src="${o.picture}" width="100"><br>
        <b>${o.name_short}</b><br><br>
        <a href="${o.link}" target="_blank">
          <button onclick="updateProgress(${i+1})">Complete</button>
        </a>
      </div>`;
    });

    setTimeout(()=>{
      document.getElementById("offers").innerHTML=html;
    },1000);

  }catch{
    document.getElementById("offers").innerText="Error loading offers";
  }
}

// Progress
function updateProgress(step){
  let percent = Math.min(step*30,100);
  document.getElementById("progressBar").style.width = percent+"%";
}
</script>

</body>
</html>
